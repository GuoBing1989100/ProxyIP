<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxyIP Filter · 高端代理实时更新筛选器</title>
    <!-- 国家名称映射文件 (请确保 countryMap.js 存在于相同目录) -->
    <script src="Data/countryMap.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 浮动粒子效果 */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* 导航栏 */
        .navbar {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        /* 玻璃态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin: 2rem 0;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2);
        }

        /* 筛选区域 */
        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-input, .filter-select {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .filter-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .filter-input:focus, .filter-select:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .filter-select option {
            background: #667eea;
            color: #fff;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-copy-all {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            border: none;
            font-weight: 700;
        }

        .btn-copy-all:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        /* 表格样式 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead {
            background: rgba(255, 255, 255, 0.15);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        th:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1rem;
            color: rgba(255, 255, 255, 0.9);
            word-break: break-word;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* 加载动画 */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .rotating {
            animation: spin 1s linear infinite;
        }

        /* 分页样式 */
        .pagination {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .pagination button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            min-width: 32px;
        }

        .pagination button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.35);
        }

        .pagination button.active {
            background: #f093fb;
            font-weight: 700;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            margin-top: 0.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .filter-section {
                grid-template-columns: 1fr;
            }
            
            .stats {
                flex-direction: column;
                gap: 1rem;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
        }

        .tag-country {
            background: linear-gradient(45deg, #f093fb, #f5576c);
        }

        /* 工具提示 */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* 中央浮动提示 */
        .center-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            transition: opacity 0.3s;
            text-align: center;
            pointer-events: none;
        }
        .center-message.success {
            background: rgba(0, 150, 0, 0.9);
        }
        .center-message.error {
            background: rgba(200, 50, 50, 0.9);
        }

        /* 静态VPN提示条 */
        .vpn-tip {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffe484;
        }
        .vpn-tip i {
            font-style: normal;
            font-size: 1.2rem;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .footer a:hover {
            color: #f093fb;
        }

        /* 更新时间显示 */
        .update-time {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.5rem;
        }

        /* 当前筛选信息 */
        .current-filter {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .current-filter strong {
            color: #f093fb;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <div class="logo">
                    🚀 ProxyIP Filter 实时更新
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-number" id="totalCount">0</div>
                        <div class="stat-label">总代理数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="countryCount">0</div>
                        <div class="stat-label">国家数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="filteredCount">0</div>
                        <div class="stat-label">筛选结果</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container">
        <!-- 筛选面板 -->
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <h2 style="font-size: 1.5rem;">🔍 智能筛选</h2>
                <div class="update-time" id="updateTime">数据加载中...</div>
            </div>
            <div class="filter-section">
                <div class="filter-group">
                    <label class="filter-label">🌍 国家/地区</label>
                    <select class="filter-select" id="countryFilter">
                        <option value="">全部国家</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">🔌 端口</label>
                    <input type="text" class="filter-input" id="portFilter" placeholder="输入端口号...">
                </div>
                <div class="filter-group">
                    <label class="filter-label">🏢 ISP/公司</label>
                    <input type="text" class="filter-input" id="companyFilter" placeholder="搜索公司名称...">
                </div>
            </div>
            <div class="button-group">
                <button class="btn btn-secondary" onclick="resetFilters()">🔄 重置筛选</button>
                <button class="btn btn-secondary" id="refreshBtn" onclick="refreshData()">
                    <span id="refreshIcon">🔃</span> 刷新数据
                </button>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="glass-card">
            <!-- 静态VPN提示条 (始终显示) -->
            <div class="vpn-tip">
                <i>🛡️</i> 提示：若数据加载失败或长时间无响应，请尝试开启VPN后刷新页面。
            </div>

            <!-- 当前筛选信息 -->
            <div id="currentFilterInfo" class="current-filter" style="display: none;">
                当前筛选: <strong id="currentCountry"></strong> 共 <strong id="currentCount">0</strong> 条代理
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;">
                <h2 style="font-size: 1.5rem; margin: 0;">📊 代理列表</h2>
                <button class="btn btn-copy-all" id="copyAllBtn" onclick="copyAllProxies()" style="display: none;">
                    📋 全部复制当前国家
                </button>
            </div>
            
            <div class="table-wrapper">
                <table id="proxyTable">
                    <thead>
                        <tr>
                            <th onclick="sortTable(0)">IP地址 ↕</th>
                            <th onclick="sortTable(1)">端口 ↕</th>
                            <th onclick="sortTable(2)">国家 ↕</th>
                            <th onclick="sortTable(3)">ISP/公司 ↕</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 中央加载提示：初始显示在表格内 -->
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 3rem;">
                                <div class="loader"></div>
                                <p style="font-size: 1.2rem; margin-top: 1rem;">正在加载数据，请稍候...</p>
                                <p style="color: rgba(255,255,255,0.6);">如果长时间无响应，请尝试开启VPN后刷新</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- 分页区域 -->
            <div id="pagination" class="pagination"></div>
            <div id="paginationInfo" class="pagination-info"></div>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <p>数据来源: <a href="https://xy.148668.xyz" target="_blank">KuDogXy提供</a> | 实时自动更新</p>
        <p>Made with ❤️</p>
    </div>

    <!-- 中央浮动提示（用于临时消息，默认隐藏） -->
    <div id="centerMessage" class="center-message" style="display: none;"></div>

    <script>
        (function() {
            // ---------- 全局变量 ----------
            let allData = [];                // 原始数据
            let filteredData = [];            // 筛选后数据
            let lastUpdateTime = null;
            let currentCountryFilter = '';     // 当前选择的国家（用于复制按钮）

            // 分页相关
            let currentPage = 1;
            const PAGE_SIZE = 50;

            // 排序状态
            let sortDirection = { ip: false, port: false, country: false, company: false };

            // DOM 元素
            const totalCountEl = document.getElementById('totalCount');
            const countryCountEl = document.getElementById('countryCount');
            const filteredCountEl = document.getElementById('filteredCount');
            const updateTimeEl = document.getElementById('updateTime');
            const tableBody = document.getElementById('tableBody');
            const paginationDiv = document.getElementById('pagination');
            const paginationInfo = document.getElementById('paginationInfo');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const currentFilterInfo = document.getElementById('currentFilterInfo');
            const currentCountryEl = document.getElementById('currentCountry');
            const currentCountEl = document.getElementById('currentCount');
            const refreshBtn = document.getElementById('refreshBtn');
            const refreshIcon = document.getElementById('refreshIcon');
            const centerMessage = document.getElementById('centerMessage');

            // 筛选输入元素
            const countryFilter = document.getElementById('countryFilter');
            const portFilter = document.getElementById('portFilter');
            const companyFilter = document.getElementById('companyFilter');

            // 中央消息定时器
            let messageTimer = null;

            // ---------- 辅助函数 ----------
            // 显示中央消息（5秒后自动消失）
            function showCenterMessage(text, isSuccess = true) {
                if (messageTimer) clearTimeout(messageTimer);
                centerMessage.textContent = text;
                centerMessage.className = 'center-message ' + (isSuccess ? 'success' : 'error');
                centerMessage.style.display = 'block';
                messageTimer = setTimeout(() => {
                    centerMessage.style.display = 'none';
                }, 5000);
            }

            function updateTimeDisplay() {
                if (lastUpdateTime) {
                    const timeStr = lastUpdateTime.toLocaleString('zh-CN', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    updateTimeEl.textContent = `最后更新: ${timeStr}`;
                } else {
                    updateTimeEl.textContent = '数据加载中...';
                }
            }

            // 更新统计数字
            function updateStats() {
                totalCountEl.textContent = allData.length.toLocaleString();
                const uniqueCountries = new Set(allData.map(item => item.country));
                countryCountEl.textContent = uniqueCountries.size;
                filteredCountEl.textContent = filteredData.length.toLocaleString();
            }

            // 更新复制按钮和筛选信息显示
            function updateCopyButton() {
                if (currentCountryFilter && filteredData.length > 0) {
                    copyAllBtn.style.display = 'flex';
                    currentFilterInfo.style.display = 'block';
                    currentCountryEl.textContent = currentCountryFilter;
                    currentCountEl.textContent = filteredData.length.toLocaleString();
                } else {
                    copyAllBtn.style.display = 'none';
                    currentFilterInfo.style.display = 'none';
                }
            }

            // 填充国家下拉框
            function populateCountryFilter() {
                const countries = [...new Set(allData.map(item => item.country))].sort();
                countryFilter.innerHTML = '<option value="">全部国家</option>';
                countries.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c;
                    option.textContent = c;
                    countryFilter.appendChild(option);
                });
            }

            // 应用筛选（从表单读取值）
            function applyFilters() {
                const country = countryFilter.value;
                const port = portFilter.value.trim();
                const company = companyFilter.value.trim().toLowerCase();

                currentCountryFilter = country;   // 用于复制按钮

                filteredData = allData.filter(item => {
                    return (!country || item.country === country) &&
                           (!port || item.port.includes(port)) &&
                           (!company || item.company.toLowerCase().includes(company));
                });

                // 重置到第一页
                currentPage = 1;
                updateStats();
                renderTable();
                renderPagination();
                updateCopyButton();
            }

            // 重置筛选
            window.resetFilters = function() {
                countryFilter.value = '';
                portFilter.value = '';
                companyFilter.value = '';
                filteredData = [...allData];
                currentPage = 1;
                currentCountryFilter = '';
                updateStats();
                renderTable();
                renderPagination();
                updateCopyButton();
                showCenterMessage('🔄 筛选已重置', true);
            };

            // 渲染表格（分页）
            function renderTable() {
                if (filteredData.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 3rem;">没有找到匹配的数据</td></tr>';
                    paginationDiv.innerHTML = '';
                    paginationInfo.textContent = '';
                    return;
                }

                const total = filteredData.length;
                const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
                if (currentPage > totalPages) currentPage = totalPages;

                const start = (currentPage - 1) * PAGE_SIZE;
                const end = Math.min(start + PAGE_SIZE, total);
                const pageData = filteredData.slice(start, end);

                let html = '';
                pageData.forEach(item => {
                    // 简单转义单引号，防止 onclick 字符串中断
                    const proxyStr = `${item.ip}:${item.port}`.replace(/'/g, "\\'");
                    html += `<tr>
                        <td>${item.ip}</td>
                        <td>${item.port}</td>
                        <td><span class="tag tag-country">${item.country}</span></td>
                        <td>${item.company}</td>
                        <td>
                            <button class="copy-btn tooltip" onclick="copyToClipboard('${proxyStr}')">
                                📋 复制
                                <span class="tooltiptext">复制到剪贴板</span>
                            </button>
                        </td>
                    </tr>`;
                });
                tableBody.innerHTML = html;

                paginationInfo.textContent = `第 ${currentPage} / ${totalPages} 页，每页 ${PAGE_SIZE} 条，共 ${total} 条`;
            }

            // 渲染分页控件
            function renderPagination() {
                if (filteredData.length === 0) {
                    paginationDiv.innerHTML = '';
                    return;
                }

                const totalPages = Math.max(1, Math.ceil(filteredData.length / PAGE_SIZE));
                let btns = '';

                // 上一页
                btns += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">«</button>`;

                // 页码逻辑：显示最多7个按钮
                let start = Math.max(1, currentPage - 3);
                let end = Math.min(totalPages, start + 6);
                if (end - start < 6) start = Math.max(1, end - 6);

                for (let i = start; i <= end; i++) {
                    btns += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                }

                // 下一页
                btns += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">»</button>`;

                paginationDiv.innerHTML = btns;
            }

            // 分页跳转（全局函数，供onclick调用）
            window.changePage = function(page) {
                const totalPages = Math.max(1, Math.ceil(filteredData.length / PAGE_SIZE));
                if (page < 1 || page > totalPages) return;
                currentPage = page;
                renderTable();
                renderPagination();
            };

            // 排序
            window.sortTable = function(colIndex) {
                const keys = ['ip', 'port', 'country', 'company'];
                const key = keys[colIndex];
                // 切换方向
                sortDirection[key] = !sortDirection[key];
                const direction = sortDirection[key] ? 1 : -1;

                filteredData.sort((a, b) => {
                    let aVal = a[key];
                    let bVal = b[key];
                    if (key === 'port') {
                        aVal = parseInt(aVal, 10);
                        bVal = parseInt(bVal, 10);
                    }
                    if (aVal === bVal) return 0;
                    return (aVal > bVal ? 1 : -1) * direction;
                });

                currentPage = 1;
                renderTable();
                renderPagination();
            };

            // 复制单个代理
            window.copyToClipboard = function(text) {
                navigator.clipboard.writeText(text).then(() => {
                    showCenterMessage(`✅ 已复制: ${text}`, true);
                }).catch(() => {
                    showCenterMessage('❌ 复制失败', false);
                });
            };

            // 复制当前筛选结果（全部）
            window.copyAllProxies = function() {
                if (!filteredData.length || !currentCountryFilter) {
                    showCenterMessage('❌ 没有可复制的数据', false);
                    return;
                }
                const proxyList = filteredData.map(item => `${item.ip}:${item.port}`).join('\n');
                navigator.clipboard.writeText(proxyList).then(() => {
                    showCenterMessage(`✅ 已复制 ${filteredData.length} 条 ${currentCountryFilter} 代理`, true);
                }).catch(() => {
                    showCenterMessage('❌ 复制失败，请重试', false);
                });
            };

            // ---------- 数据加载 ----------
            async function loadData(isRefresh = false) {
                // 保存旧数据，以便加载失败时恢复
                const oldAllData = allData;
                const oldFiltered = filteredData;
                const oldCountryFilter = currentCountryFilter;
                const oldPage = currentPage;

                // 显示加载中（表格内已经有加载动画，但如果是刷新，需要确保表格显示加载状态）
                if (!isRefresh || allData.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 3rem;">
                        <div class="loader"></div>
                        <p style="font-size: 1.2rem; margin-top: 1rem;">正在加载数据，请稍候...</p>
                        <p style="color: rgba(255,255,255,0.6);">如果长时间无响应，请尝试开启VPN后刷新</p>
                    </td></tr>`;
                }

                try {
                    const timestamp = Date.now();
                    // 使用用户指定的新数据源
                    const url = `https://raw.githubusercontent.com/Mayumiwandi/Emilia/refs/heads/main/Data/alive.txt?t=${timestamp}`;
                    const response = await fetch(url);
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const text = await response.text();
                    if (text.includes('<!DOCTYPE') || text.includes('<html')) {
                        throw new Error('响应内容不是有效的代理数据');
                    }

                    const lines = text.trim().split('\n').filter(l => l.trim());
                    const newData = lines.map((line, idx) => {
                        const parts = line.split(',');
                        if (parts.length < 3) return null;
                        const ip = parts[0].trim();
                        const port = parts[1].trim();
                        const countryCode = parts[2].trim();
                        // 公司名可能包含逗号，合并剩余部分
                        const company = parts.length > 3 ? parts.slice(3).join(',').trim() : 'Unknown';
                        // 使用全局 countryNames（来自 countryMap.js），若不存在则回退为code
                        const country = (typeof window.countryNames !== 'undefined' && window.countryNames[countryCode]) ? window.countryNames[countryCode] : countryCode;
                        return { ip, port, countryCode, country, company };
                    }).filter(item => item !== null);

                    if (newData.length === 0) throw new Error('数据文件为空');

                    allData = newData;
                    filteredData = [...allData];
                    currentPage = 1;
                    currentCountryFilter = '';  // 重置国家筛选
                    lastUpdateTime = new Date();

                    // 更新UI
                    populateCountryFilter();
                    updateStats();
                    renderTable();
                    renderPagination();
                    updateCopyButton();
                    updateTimeDisplay();

                    showCenterMessage('✅ 数据加载成功', true);
                } catch (error) {
                    console.error('加载失败:', error);
                    // 如果之前有旧数据，恢复
                    if (oldAllData.length > 0) {
                        allData = oldAllData;
                        filteredData = oldFiltered;
                        currentPage = oldPage;
                        currentCountryFilter = oldCountryFilter;
                        renderTable();
                        renderPagination();
                        updateCopyButton();
                        updateStats(); // 恢复统计
                        // 表格内显示错误提示（带VPN建议）
                        tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ff6b6b; padding: 3rem;">
                            <strong>❌ 刷新失败，使用上次缓存</strong><br>
                            <small>若问题持续，请尝试开启VPN后刷新页面。</small>
                        </td></tr>`;
                        showCenterMessage('⚠️ 刷新失败，使用上次缓存', false);
                    } else {
                        // 首次加载失败，显示错误提示
                        tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #ff6b6b; padding: 3rem;">
                            <strong>❌ 加载失败: ${error.message}</strong><br>
                            <small>可能是网络问题，请尝试开启VPN后刷新页面。</small>
                        </td></tr>`;
                        updateTimeEl.textContent = '加载出错';
                        showCenterMessage('❌ 加载失败，请尝试开启VPN', false);
                    }
                }
            }

            // 刷新按钮
            window.refreshData = async function() {
                if (refreshBtn.disabled) return;
                refreshBtn.disabled = true;
                refreshIcon.classList.add('rotating');

                await loadData(true);  // 传入true表示是刷新操作

                refreshBtn.disabled = false;
                refreshIcon.classList.remove('rotating');
            };

            // 初始化粒子背景
            function createParticles() {
                for (let i = 0; i < 40; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.animationDelay = Math.random() * 20 + 's';
                    p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                    document.body.appendChild(p);
                }
            }

            // ---------- 事件绑定 ----------
            // 统一使用 input 事件（对 select 也有效）
            [countryFilter, portFilter, companyFilter].forEach(input => {
                input.addEventListener('input', applyFilters);
            });

            // 启动
            createParticles();
            loadData(false); // 首次加载
        })();
    </script>
</body>
</html>
